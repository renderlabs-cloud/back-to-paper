[hero]
title_1 = "Trust is"
title_2 = "Not a Script."
description = "Every browser-based assessment is a sandbox the student already owns. Client-side lockdowns are performance art — they simulate control while the DOM remains an open book. The only tamper-proof medium is the one that predates the transistor."
cta = "READ THE MANIFESTO"
version = "Version 1.0.4 // Physical Integrity Protocol"

[exploits]
title = "The Exploit Gallery"
subtitle = 'Every "secure" browser-based assessment has a fatal flaw: the client is the enemy.'

[exploits.dom]
title = "DOM Manipulation"
code = """
document.querySelectorAll('.q-opt')
  .forEach(el => {
    el.style.border =
      el.dataset.correct
        ? '3px solid green'
        : 'none';
  });"""
description = "Client-side security is an oxymoron. If the user owns the machine, they own the truth. Every answer, every flag, every validation lives in memory the student controls."

[exploits.devtools]
title = "DevTools Bypass"
code = """
// "Disabled" DevTools?
// Ctrl+Shift+I blocked?
chrome.exe
  --remote-debugging-port=9222

// Now inspect anything.
// The browser obeys its owner,
// not your script."""
description = "Keyboard shortcut blocking is a curtain, not a wall. Remote debugging, browser extensions, and alternative clients render every lockdown theatrical."

[exploits.network]
title = "Network Interception"
code = """
// mitmproxy or Burp Suite
$ mitmproxy --mode transparent

// Intercept, read, modify
// every request and response.
// Answers in transit are
// answers in the open."""
description = "HTTPS between client and server means nothing when the student controls the endpoint. Proxy tools turn encrypted traffic into plaintext in seconds."

[manifesto]
title = "The Manifesto"
subtitle = "A declaration for assessment integrity in the age of automation."
points = [
  'The screen is a liar. Every pixel is mutable, every script is overridable, every "secure" browser is a suggestion.',
  "94% of browser lockdowns are bypassed in under 120 seconds. This is not a bug — it is the architecture.",
  "Proctoring software watches the student's camera while the student's second device watches the answers. Surveillance is not security.",
  "AI-generated text is indistinguishable from competent student writing. The digital submission pipeline is permanently compromised.",
  "Handwriting cannot be generated by a language model. A pen stroke carries biometric data no algorithm can fabricate at scale.",
  "Paper assessments are not a regression. They are the only medium where the hand cannot be automated and the answer cannot be proxied.",
  "We do not advocate for the elimination of technology in education. We advocate for the elimination of false confidence in digital integrity.",
]

